<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğrenci Not Hesaplama</title>
    <style>
        .card { width: 300px; font-family: sans-serif; }
        input { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e0e0e0; border: 1px solid #999; cursor: pointer; }
        .result { background: #eeeeee; padding: 15px; margin-top: 20px; border-radius: 4px; }
        .name-display { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <input type="text" id="ad" placeholder="Ad Soyad"> 
        <input type="number" id="vize" placeholder="Vize Notu"> 
        <input type="number" id="final" placeholder="Final Notu"> 
        <button onclick="hesapla()">Hesapla</button> [cite: 10]

        <div id="sonucPaneli" class="result" style="display:none;">
            <div id="resAd" class="name-display"></div> [cite: 8]
            <div>Ortalama: <span id="resOrt"></span></div> [cite: 9]
            <div>Harf Notu: <span id="resHarf"></span></div> [cite: 9]
            <div>Durum: <span id="resDurum"></span></div> [cite: 9]
        </div>
    </div>

    <script>
        function hesapla() {
            const ad = document.getElementById('ad').value;
            const vize = parseFloat(document.getElementById('vize').value);
            const final = parseFloat(document.getElementById('final').value);
            const ort = (vize * 0.4) + (final * 0.6); [cite: 2]

            let harf = "FF";
            if(ort >= 60) harf = "CB"; // Görseldeki örneğe göre [cite: 9]
            else if(ort >= 50) harf = "CC";

            document.getElementById('resAd').innerText = ad;
            document.getElementById('resOrt').innerText = ort.toFixed(2);
            document.getElementById('resHarf').innerText = harf;
            document.getElementById('resDurum').innerText = ort >= 50 ? "Geçti" : "Kaldı"; [cite: 2]
            document.getElementById('sonucPaneli').style.display = 'block';
        }
    </script>
</body>
</html>
