<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafta 7 - Etkinlik Kayıt Sayfası</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" [cite: 83]>
    <style>
        .dark-mode {
            background-color: #212529 !important;
            color: #f8f9fa !important;
        }
        .dark-mode .card {
            background-color: #343a40;
            color: white;
            border-color: #495057;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand" href="#">Etkinlik Portalı</a>
            <button class="btn btn-outline-light ms-auto" id="temaButonu">Temayı Değiştir</button>
        </div>
    </nav>

    <div class="container py-5" [cite: 84, 88]>
        <div class="row mb-5">
            <div class="col-md-4">
                <div class="card shadow-sm rounded-4 h-100">
                    <div class="card-body">
                        <h5 class="card-title">Atölye Çalışmaları</h5>
                        <p class="card-text text-secondary">Yaratıcı atölyelerle kendinizi geliştirin.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm rounded-4 h-100">
                    <div class="card-body">
                        <h5 class="card-title">Seminerler</h5>
                        <p class="card-text text-secondary">Uzmanlardan en yeni bilgileri dinleyin.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm rounded-4 h-100">
                    <div class="card-body">
                        <h5 class="card-title">Networking</h5>
                        <p class="card-text text-secondary">Yeni insanlarla tanışma fırsatı yakalayın.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card shadow-sm p-4">
                    <h3 class="mb-4">Etkinlik Kayıt Formu</h3>
                    <form id="kayitFormu">
                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" id="adSoyad" class="form-control" placeholder="Adınızı giriniz" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-posta</label>
                            <input type="email" id="eposta" class="form-control" placeholder="mail@ornek.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Etkinlik Seçimi</label>
                            <select id="etkinlik" class="form-select" required>
                                <option value="">Seçiniz...</option>
                                <option value="Web Geliştirme">Web Geliştirme Atölyesi</option>
                                <option value="Yapay Zeka">Yapay Zeka Semineri</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Kayıt Ol</button>
                    </form>
                </div>

                <div id="ozetAlani" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Tema Değiştirme Fonksiyonu [cite: 96]
        const temaButonu = document.getElementById('temaButonu');
        temaButonu.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        // Form Gönderimi ve Özet Oluşturma [cite: 92, 93, 95]
        const form = document.getElementById('kayitFormu');
        const ozetAlani = document.getElementById('ozetAlani');

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Sayfanın yenilenmesini engeller

            const ad = document.getElementById('adSoyad').value;
            const eposta = document.getElementById('eposta').value;
            const etkinlik = document.getElementById('etkinlik').value;

            // Dinamik sonuç alanı oluşturma
            ozetAlani.innerHTML = `
                <div class="alert alert-success shadow-sm">
                    <h5>Kayıt Başarılı!</h5>
                    <p><strong>Ad Soyad:</strong> ${ad}</p>
                    <p><strong>E-posta:</strong> ${eposta}</p>
                    <p><strong>Etkinlik:</strong> ${etkinlik}</p>
                </div>
            `;
            
            form.reset(); // Formu temizler
        });
    </script>
</body>
</html>
