<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Birim Dönüştürücü</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f4f4f4; 
        }

        /* Ana Sayfa Buton Stili */
        .home-button { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            text-decoration: none; 
            color: #333; 
            padding: 8px 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            background: white; 
            font-size: 13px; 
        }
        .home-button:hover { 
            background: #eee; 
        }

        .card { 
            width: 350px; 
            background: white; 
            border-radius: 8px; 
            padding: 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        h2 { 
            margin-top: 0; 
            font-size: 24px; 
            color: #333; 
        }
        label { 
            display: block; 
            margin-top: 10px; 
            margin-bottom: 5px; 
            color: #333; 
            font-weight: bold;
            font-size: 14px;
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            margin-top: 20px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        #sonucBox { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #d4edda; 
            border-radius: 5px; 
            text-align: center; 
            font-weight: bold; 
            color: #155724; 
            display: none; 
        }
    </style>
</head>
<body>

<a href="index.html" class="home-button">Ana Sayfaya Dön</a>

<div class="card">
    <h2>Birim Dönüştürücü</h2> 
    <label>Değer Giriniz</label> 
    <input type="number" id="deger" placeholder="50"> 
    
    <label>Dönüşüm Tipi:</label> 
    <select id="tip">
        <option value="CtoF">Celsius -> Fahrenheit</option> 
        <option value="MtoK">Metre -> Kilometre</option> 
        <option value="KtoG">Kilogram -> Gram</option> 
    </select>
    
    <button onclick="donustur()">Hesapla</button> 
    
    <div id="sonucBox">
        Sonuç: <span id="sonucText"></span> 
    </div>
</div>

<script>
function donustur() {
    const val = parseFloat(document.getElementById('deger').value);
    const tip = document.getElementById('tip').value;
    let sonuc = 0;

    if (isNaN(val)) {
        alert("Lütfen bir sayı giriniz.");
        return;
    }

    if (tip === "CtoF") {
        sonuc = (val * 1.8) + 32; 
    } else if (tip === "MtoK") {
        sonuc = val / 1000;
    } else if (tip === "KtoG") {
        sonuc = val * 1000;
    }

    document.getElementById('sonucText').innerText = sonuc.toLocaleString('tr-TR');
    document.getElementById('sonucBox').style.display = 'block';
}
</script>

</body>
</html>
